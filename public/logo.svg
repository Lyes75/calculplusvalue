<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Fond indigo -->
  <rect width="480" height="120" fill="#2D2B55" rx="0"/>

  <!-- Icône maison + graphique -->
  <!-- Toit de la maison -->
  <polygon points="18,58 54,28 90,58" fill="none" stroke="white" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Corps maison -->
  <rect x="27" y="58" width="54" height="36" fill="none" stroke="white" stroke-width="5" stroke-linejoin="round"/>
  <!-- Fenêtre / porte -->
  <rect x="44" y="68" width="18" height="18" fill="none" stroke="white" stroke-width="4"/>
  <!-- Graphique / courbe montante (barres) -->
  <rect x="30" y="78" width="8" height="10" fill="white" rx="1"/>
  <rect x="42" y="70" width="8" height="18" fill="white" rx="1"/>
  <rect x="54" y="62" width="8" height="26" fill="white" rx="1"/>
  <!-- Courbe au-dessus des barres -->
  <path d="M28,76 Q44,56 72,44" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Flèche en haut de la courbe -->
  <polyline points="64,40 72,44 68,53" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Texte calculplusvalue.fr -->
  <text x="106" y="76" font-family="'DM Sans', 'Inter', Arial, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="-0.5">calculplusvalue.fr</text>
</svg>
