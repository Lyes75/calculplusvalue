<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <!-- Fond transparent -->

  <!-- === ICÔNE MAISON + GRAPHIQUE === -->
  <!-- Toit (triangle plein) -->
  <polygon points="10,52 52,14 94,52" fill="white"/>
  <!-- Cheminée -->
  <rect x="68" y="20" width="10" height="18" fill="white"/>
  <!-- Corps maison (plein blanc) -->
  <rect x="18" y="50" width="68" height="42" fill="white"/>
  <!-- Découpe intérieure maison pour créer contour (fond transparent simulé via couleur header) -->
  <!-- Barres graphique à l'intérieur (couleur indigo sur fond blanc) -->
  <rect x="26" y="72" width="12" height="14" fill="#2D2B55" rx="1"/>
  <rect x="43" y="62" width="12" height="24" fill="#2D2B55" rx="1"/>
  <rect x="60" y="54" width="12" height="32" fill="#2D2B55" rx="1"/>

  <!-- Courbe montante qui part du toit vers la droite -->
  <path d="M52,14 Q80,-4 108,18" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- Tête de flèche -->
  <polyline points="98,10 108,18 100,26" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- === TEXTE === -->
  <text x="122" y="66" font-family="'Arial Rounded MT Bold', 'DM Sans', Arial, sans-serif" font-size="38" font-weight="800" fill="white" letter-spacing="-0.5">calculplusvalue.fr</text>
</svg>
